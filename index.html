<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MMI Feedback</title>
  <style>
    :root{
      --bg:#0b1020; --card:#121a33; --muted:#a9b3d6; --text:#e9eeff; --accent:#7c6cff;
      --border:rgba(255,255,255,.08);
    }
    body{ margin:0; font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; background:radial-gradient(1000px 800px at 20% 0%, rgba(124,108,255,.25), transparent 60%), var(--bg); color:var(--text); }
    .wrap{ max-width:1100px; margin:0 auto; padding:28px 16px 60px; }
    header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
    h1{ margin:0; font-size:28px; letter-spacing:.2px; }
    .sub{ color:var(--muted); margin:6px 0 0; }
    .grid{ display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:14px; margin-top:18px; }
    @media (max-width: 900px){ .grid{ grid-template-columns:repeat(2, minmax(0,1fr)); } }
    @media (max-width: 600px){ .grid{ grid-template-columns:1fr; } }
    .card{ background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)); border:1px solid var(--border); border-radius:14px; padding:14px; }
    .title{ font-weight:700; margin:0 0 6px; }
    .desc{ margin:0 0 12px; color:var(--muted); font-size:14px; line-height:1.4; }
    a.btn{ display:inline-flex; align-items:center; gap:8px; color:white; text-decoration:none; background:rgba(124,108,255,.9);
      padding:10px 12px; border-radius:10px; font-weight:700; }
    a.btn:hover{ filter:brightness(1.08); }
    .pill{ display:inline-block; font-size:12px; padding:3px 8px; border-radius:999px; border:1px solid var(--border); color:var(--muted); }
    footer{ margin-top:24px; color:var(--muted); font-size:13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>MMI Feedback</h1>
        <p class="sub">Pick a station → write your answers → get scored feedback + model answers.</p>
      </div>
      <span class="pill">Netlify + OpenAI</span>
    </header>

    <div id="stations" class="grid"></div>

    <footer>
      Tip: Share station links like <code>station.html?id=blood_transfusion_refusal</code>.
    </footer>
  </div>

  <script>
    // Keep station IDs EXACTLY stable — station.html + mark.js depend on them
    const STATIONS = [
      {
        id: "blood_transfusion_refusal",
        title: "Refusal of life-saving blood transfusion",
        blurb: "Capacity, informed refusal, alternatives, MDT, documentation."
      },
      {
        id: "confidentiality_breach",
        title: "Confidentiality breach in public",
        blurb: "Professionalism, escalation, patient trust, reflection."
      },
      {
        id: "capacity_refusal",
        title: "Capacity + refusal of treatment",
        blurb: "MCA principles, best interests, ADRT/LPAs, safeguarding."
      },
      {
        id: "breaking_bad_news",
        title: "Breaking bad news",
        blurb: "Empathy, structure (SPIKES), support, safety-netting."
      },
      {
        id: "consent_understanding",
        title: "Informed consent",
        blurb: "Material risks, understanding, alternatives, documentation."
      },
      {
        id: "cultural_refusal",
        title: "Cultural/religious refusal",
        blurb: "Respect, shared decision-making, exploring values."
      },
      {
        id: "team_conflict",
        title: "Team conflict",
        blurb: "Communication, escalation, professionalism, reflection."
      },
      {
        id: "colleague_error",
        title: "Colleague makes an error",
        blurb: "Patient safety, duty of candour, escalation."
      },
      {
        id: "relative_requests_information",
        title: "Relative requests patient info",
        blurb: "Confidentiality, consent, capacity, de-escalation."
      }
    ];

    const el = document.getElementById("stations");
    el.innerHTML = STATIONS.map(s => `
      <div class="card">
        <p class="title">${s.title}</p>
        <p class="desc">${s.blurb}</p>
        <a class="btn" href="station.html?id=${encodeURIComponent(s.id)}">Open station →</a>
      </div>
    `).join("");
  </script>
</body>
</html>
