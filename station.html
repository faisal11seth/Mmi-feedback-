<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MMI Station</title>

<style>
body {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: #0b1220;
  color: #e8ecf1;
  margin: 0;
  padding: 24px;
}

.card {
  background: #121a2b;
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 18px;
  border: 1px solid rgba(255,255,255,0.05);
}

textarea {
  width: 100%;
  min-height: 110px;
  background: #0f172a;
  color: #e8ecf1;
  border: 1px solid #2b354d;
  border-radius: 10px;
  padding: 12px;
  resize: vertical;
}

button {
  background: linear-gradient(90deg,#6c7cff,#8b5cf6);
  border: none;
  color: white;
  padding: 14px 22px;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}

button:hover { opacity: .9 }

.h {
  font-weight: 700;
  margin: 18px 0 6px;
}

.block {
  background: #0f172a;
  border-radius: 10px;
  padding: 12px;
  border: 1px solid #26314a;
  white-space: pre-wrap;
}

.bullets {
  background: #0f172a;
  border-radius: 10px;
  padding: 12px 16px;
  border: 1px solid #26314a;
}

.bullets ul {
  margin: 0;
  padding-left: 18px;
}

.scores {
  display: grid;
  grid-template-columns: repeat(5,1fr);
  gap: 10px;
  margin-bottom: 14px;
}

.score {
  background: #0f172a;
  border: 1px solid #26314a;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.score span {
  display: block;
  font-size: 20px;
  font-weight: 700;
  margin-top: 4px;
}

#error {
  margin-top: 12px;
  color: #ff9aa2;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="card">
  <div class="h">Your answer (Main)</div>
  <textarea id="main"></textarea>

  <div class="h">Follow-up 1</div>
  <textarea id="f1"></textarea>

  <div class="h">Follow-up 2</div>
  <textarea id="f2"></textarea>

  <div class="h">Follow-up 3</div>
  <textarea id="f3"></textarea>

  <br><br>
  <button onclick="submitAnswer()">Generate feedback</button>

  <div id="error"></div>
</div>

<div id="out" class="card" style="display:none;"></div>

<script>
function $(id){ return document.getElementById(id); }

function escapeHtml(s){
  return String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function safeScore(x){
  return (x===0 || x) ? x : "-";
}

function bulletsToHtml(text){
  if(!text || !text.trim()) return "";
  const items = text.split(/[\n•-]+/).map(t=>t.trim()).filter(Boolean);
  if(!items.length) return "";
  return `<div class="bullets"><ul>${
    items.map(i=>`<li>${escapeHtml(i)}</li>`).join("")
  }</ul></div>`;
}

async function submitAnswer(){
  $("error").textContent = "";
  $("out").style.display="none";

  const body = {
    stationId: "station",
    prompts: { main:"", f1:"", f2:"", f3:"" },
    answers: {
      main: $("main").value,
      f1: $("f1").value,
      f2: $("f2").value,
      f3: $("f3").value
    }
  };

  try{
    const r = await fetch("/.netlify/functions/mark",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(body)
    });

    const data = await r.json();
    if(!r.ok) throw new Error(data.error || "Server error");

    renderResults(data);

  }catch(e){
    $("error").textContent = "Error:\n"+e.message;
  }
}

function renderResults(data){
  const out = $("out");
  out.style.display="block";

  const s = data.scores||{};
  const fb = data.feedback||{};
  const fbf = fb.followups||{};
  const m = data.models||{};
  const mb = m.bullets||{};
  const mf = m.full||{};

  function section(title, content){
    if(!content || !String(content).trim()) return "";
    return `<div class="h">${title}</div>
            <div class="block">${escapeHtml(content)}</div>`;
  }

  function bulletSection(title, text){
    if(!text || !String(text).trim()) return "";
    return `<div class="h">${title}</div>
            ${bulletsToHtml(text)}`;
  }

  out.innerHTML = `
    <div class="scores">
      <div class="score"><b>Overall</b><span>${safeScore(s.overall)}/10</span></div>
      <div class="score"><b>Communication</b><span>${safeScore(s.communication)}/10</span></div>
      <div class="score"><b>Empathy</b><span>${safeScore(s.empathy)}/10</span></div>
      <div class="score"><b>Ethics</b><span>${safeScore(s.ethics)}/10</span></div>
      <div class="score"><b>Insight</b><span>${safeScore(s.insight)}/10</span></div>
    </div>

    ${section("Feedback — Main", fb.main)}
    ${section("Feedback — Follow-up 1", fbf.f1)}
    ${section("Feedback — Follow-up 2", fbf.f2)}
    ${section("Feedback — Follow-up 3", fbf.f3)}

    ${bulletSection("Model answer — Main (bullets)", mb.main)}

    ${
      mf.main && String(mf.main).trim()
        ? `<div class="h">Model answer — Main (full)</div>
           <div class="block">${escapeHtml(mf.main)}</div>`
        : ""
    }

    ${bulletSection("Model answer — Follow-up 1", mb.f1)}
    ${bulletSection("Model answer — Follow-up 2", mb.f2)}
    ${bulletSection("Model answer — Follow-up 3", mb.f3)}
  `;
}
</script>

</body>
</html>
