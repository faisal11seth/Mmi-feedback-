<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MedVault Station</title>

  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f172a;
      --border:rgba(148,163,184,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --accent:#6366f1;
      --danger:#fb7185;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1200px 700px at 50% 0%, rgba(99,102,241,.22), transparent 60%),
        radial-gradient(900px 600px at 0% 30%, rgba(56,189,248,.12), transparent 55%),
        radial-gradient(900px 600px at 100% 35%, rgba(168,85,247,.10), transparent 55%),
        var(--bg);
      color:var(--text);
    }
    .container{
      max-width:1100px;
      margin:0 auto;
      padding:22px 16px 46px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .back{
      appearance:none;
      border:1px solid rgba(148,163,184,.25);
      background:rgba(15,23,42,.35);
      color:var(--text);
      padding:8px 10px;
      border-radius:10px;
      cursor:pointer;
      font-size:13px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      opacity:.95;
    }
    .brand img{
      width:40px;
      height:40px;
      border-radius:10px;
      object-fit:cover;
      border:1px solid rgba(148,163,184,.22);
    }
    .brand span{
      font-size:13px;
      color:var(--muted);
    }

    .panel{
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border-radius:16px;
      padding:16px;
    }

    .title{
      font-size:20px;
      font-weight:800;
      margin:0 0 10px;
      line-height:1.25;
    }
    .metaRow{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:12px;
    }
    .pill{
      font-size:11px;
      border:1px solid rgba(148,163,184,.22);
      color:#cbd5e1;
      padding:3px 8px;
      border-radius:999px;
      background:rgba(15,23,42,.35);
    }

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:10px 0 6px;
    }
    input, textarea{
      width:100%;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(15,23,42,.35);
      color:var(--text);
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      outline:none;
    }
    textarea{ min-height:92px; resize:vertical; }

    .qCard{
      border:1px solid rgba(148,163,184,.18);
      background:rgba(15,23,42,.25);
      border-radius:14px;
      padding:12px;
      margin-top:12px;
    }
    .qHead{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }
    .qText{
      font-size:16px;
      font-weight:750;
      line-height:1.3;
      margin-bottom:10px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
      margin-top:12px;
    }
    @media (min-width: 860px){
      .grid{ grid-template-columns: 1fr 1fr; }
      .span2{ grid-column: 1 / span 2; }
    }

    .actions{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      appearance:none;
      border:none;
      background:var(--accent);
      color:white;
      padding:10px 14px;
      border-radius:12px;
      font-weight:750;
      cursor:pointer;
      font-size:14px;
      box-shadow: 0 10px 25px rgba(99,102,241,.25);
    }
    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }
    .hint{
      color:var(--muted);
      font-size:12px;
      flex:1;
      min-width:260px;
    }

    .err{
      margin-top:12px;
      border:1px solid rgba(251,113,133,.35);
      background:rgba(251,113,133,.08);
      color:#fecdd3;
      padding:10px 12px;
      border-radius:12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      white-space:pre-wrap;
    }

    .result{
      margin-top:14px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(15,23,42,.25);
      border-radius:14px;
      padding:12px;
    }
    .scores{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap:10px;
      margin-bottom:10px;
    }
    .score{
      border:1px solid rgba(148,163,184,.18);
      border-radius:12px;
      padding:10px;
      background:rgba(15,23,42,.35);
    }
    .score b{ display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
    .score span{ font-size:18px; font-weight:850; }

    .h{
      margin-top:10px;
      font-weight:850;
      font-size:13px;
      color:#c7d2fe;
    }
    .block{
      margin-top:6px;
      color:#e2e8f0;
      font-size:13px;
      line-height:1.55;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <button class="back" onclick="window.location.href='index.html'">← Back</button>

      <div class="brand">
        <span>MedVaultUK</span>
        <img src="logo.png" alt="MedVault logo">
      </div>
    </div>

    <div class="panel">
      <h2 class="title" id="stationTitle">Station</h2>

      <div class="metaRow">
        <div class="pill">Reading: 2m</div>
        <div class="pill">Response: 6m</div>
        <div class="pill">Follow-ups: 2m</div>
      </div>

      <label for="studentName">Student name</label>
      <input id="studentName" type="text" placeholder="Type your name"/>

      <div class="qCard">
        <div class="qHead">Main question</div>
        <div class="qText" id="qMain"></div>
        <label for="aMain">Your answer (Main)</label>
        <textarea id="aMain" placeholder="Type your spoken answer to the main question..."></textarea>
      </div>

      <div class="grid">
        <div class="qCard">
          <div class="qHead">Follow-up 1</div>
          <div class="qText" id="qF1"></div>
          <label for="aF1">Your answer (Follow-up 1)</label>
          <textarea id="aF1" placeholder="Answer follow-up 1..."></textarea>
        </div>

        <div class="qCard">
          <div class="qHead">Follow-up 2</div>
          <div class="qText" id="qF2"></div>
          <label for="aF2">Your answer (Follow-up 2)</label>
          <textarea id="aF2" placeholder="Answer follow-up 2..."></textarea>
        </div>

        <div class="qCard span2">
          <div class="qHead">Follow-up 3</div>
          <div class="qText" id="qF3"></div>
          <label for="aF3">Your answer (Follow-up 3)</label>
          <textarea id="aF3" placeholder="Answer follow-up 3..."></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="btn" onclick="generate()">Generate feedback</button>
        <div class="hint">
          Tip: write how you’d speak it in a timed MMI (clear + structured). If feedback is slow, try shorter answers.
        </div>
      </div>

      <div id="err" class="err" style="display:none;"></div>
      <div id="out" class="result" style="display:none;"></div>
    </div>
  </div>

  <script>
    // ✅ EXACT SAME stationIds as index.html
    const STATIONS_META = {
      blood_transfusion_refusal: {
        title:"Refusal of life-saving blood transfusion",
        prompts:{
          main:"A patient refuses a life-saving blood transfusion for religious reasons. Discuss how you would approach this situation.",
          f1:"What would you do if the patient did not have capacity?",
          f2:"How would you involve the MDT and/or family appropriately (while respecting confidentiality)?",
          f3:"Can you suggest ethically acceptable alternatives and how you would discuss them?"
        }
      },
      confidentiality_breach: {
        title:"Confidentiality breach in a public area",
        prompts:{
          main:"You overhear a medical student discussing an identifiable patient loudly in a corridor. How do you respond?",
          f1:"How would you handle it if they become defensive or dismissive?",
          f2:"What steps would you take if members of the public/other patients overheard?",
          f3:"What key points would you include in a reflection about this incident?"
        }
      },
      colleague_error: {
        title:"Medication prescribing error noticed",
        prompts:{
          main:"You notice a junior doctor has prescribed a potentially harmful dose of a medication. Talk through exactly what you would do.",
          f1:"What would you do if the doctor insists the prescription is correct and refuses to change it?",
          f2:"What would you do if you realise the patient has already received the dose?",
          f3:"How would you communicate this to the patient (or family) in line with duty of candour?"
        }
      },
      dnar_conflict: {
        title:"DNACPR disagreement with family",
        prompts:{
          main:"A patient has a DNACPR decision documented. The family insist that ‘everything must be done’ and demand CPR. How do you respond?",
          f1:"How would you explain what DNACPR does and does not mean?",
          f2:"Who is involved in making DNACPR decisions and what is the family’s role?",
          f3:"If conflict continues, what escalation and support options would you use?"
        }
      },
      capacity_refusal: {
        title:"Refusal of recommended treatment",
        prompts:{
          main:"A competent adult refuses a recommended treatment that is likely to prevent serious harm. How do you proceed?",
          f1:"How would you assess capacity in this situation?",
          f2:"How would you explore reasons and support shared decision-making without coercion?",
          f3:"What documentation and safety-netting would you put in place?"
        }
      },
      breaking_bad_news: {
        title:"Breaking bad news: new cancer diagnosis",
        prompts:{
          main:"You need to tell a patient their tests show a new cancer diagnosis. How would you conduct this conversation?",
          f1:"How would you structure the conversation (e.g., SPIKES) and check understanding?",
          f2:"What would you do if the patient says they don’t want details right now?",
          f3:"What immediate support, next steps, and safety-netting would you offer?"
        }
      },
      team_conflict: {
        title:"Team conflict affecting patient care",
        prompts:{
          main:"Two staff members are arguing during a busy shift and patient care is being affected. What would you do?",
          f1:"How would you address this in the moment to protect patient safety?",
          f2:"How would you handle it if one person is senior and dismisses your concerns?",
          f3:"What follow-up actions would you take after the shift (reflection/learning/escalation)?"
        }
      },
      cultural_refusal: {
        title:"Treatment refusal due to cultural/religious beliefs",
        prompts:{
          main:"A patient refuses an important treatment because of cultural or religious beliefs. How would you approach this?",
          f1:"How would you ensure your communication is culturally safe and the patient feels respected?",
          f2:"If refusal risks significant harm, how would you explore alternatives and shared decision-making?",
          f3:"What would you do to avoid stereotyping or assumptions about the patient’s beliefs?"
        }
      },
      consent_understanding: {
        title:"Patient lacks understanding during consent",
        prompts:{
          main:"A patient agrees to a procedure but seems not to understand what it involves. How do you proceed?",
          f1:"How do you assess whether consent is valid?",
          f2:"What would you do if they still do not understand after explanation?",
          f3:"Why is informed consent ethically important?"
        }
      },
      relative_requests_information: {
        title:"Relative requests patient information",
        prompts:{
          main:"A patient’s relative asks you for details about their condition, but the patient has not given consent to share information. How do you handle this?",
          f1:"What if the relative insists they have a ‘right to know’?",
          f2:"When can confidentiality be breached?",
          f3:"How would you handle this sensitively while maintaining trust?"
        }
      }
    };

    function $(id){ return document.getElementById(id); }

    function getStationId(){
      const p = new URLSearchParams(window.location.search);
      return p.get("station");
    }

    const stationId = getStationId();
    const station = STATIONS_META[stationId];

    if(!station){
      $("stationTitle").textContent = "Station not found";
      $("qMain").textContent = "This station link is invalid. Go back and select a station again.";
      $("btn").disabled = true;
    } else {
      $("stationTitle").textContent = station.title;
      $("qMain").textContent = station.prompts.main;
      $("qF1").textContent = station.prompts.f1;
      $("qF2").textContent = station.prompts.f2;
      $("qF3").textContent = station.prompts.f3;
      document.title = "MedVault • " + station.title;
    }

    function showErr(msg){
      const e = $("err");
      e.style.display = "block";
      e.textContent = "Error:\n" + msg;
      $("out").style.display = "none";
    }
    function clearErr(){
      $("err").style.display = "none";
      $("err").textContent = "";
    }
    function setLoading(on){
      $("btn").disabled = on;
      $("btn").textContent = on ? "Generating..." : "Generate feedback";
    }

    function safeScore(v){
      const n = Number(v);
      if(Number.isFinite(n)) return n;
      return 0;
    }

    // ✅ UPDATED: matches your new mark.js JSON shape
    function renderResults(data){
      const out = $("out");
      out.style.display = "block";

      const scores = data.scores || {};
      const feedback = data.feedback || {};
      const models = data.models || {};

      const followFb = feedback.followups || {};
      const bullets = models.bullets || {};
      const full = models.full || {};

      out.innerHTML = `
        <div class="scores">
          <div class="score"><b>Overall</b><span>${safeScore(scores.overall)}/10</span></div>
          <div class="score"><b>Communication</b><span>${safeScore(scores.communication)}/10</span></div>
          <div class="score"><b>Empathy</b><span>${safeScore(scores.empathy)}/10</span></div>
          <div class="score"><b>Ethics/Reasoning</b><span>${safeScore(scores.ethics)}/10</span></div>
          <div class="score"><b>Insight</b><span>${safeScore(scores.insight)}/10</span></div>
        </div>

        <div class="h">Feedback — Main</div>
        <div class="block">${feedback.main || ""}</div>

        <div class="h">Feedback — Follow-up 1</div>
        <div class="block">${followFb.f1 || ""}</div>

        <div class="h">Feedback — Follow-up 2</div>
        <div class="block">${followFb.f2 || ""}</div>

        <div class="h">Feedback — Follow-up 3</div>
        <div class="block">${followFb.f3 || ""}</div>

        <div class="h">Model answer — Main (bullets)</div>
        <div class="block">${bullets.main || ""}</div>

        <div class="h">Model answer — Main (full)</div>
        <div class="block">${full.main || ""}</div>

        <div class="h">Model answer — Follow-ups (bullets)</div>
        <div class="block"><b>Follow-up 1:</b>\n${bullets.f1 || ""}</div>
        <div class="block"><b>Follow-up 2:</b>\n${bullets.f2 || ""}</div>
        <div class="block"><b>Follow-up 3:</b>\n${bullets.f3 || ""}</div>
      `;
    }

    async function generate(){
      clearErr();

      if(!stationId || !station){
        showErr("Unknown stationId");
        return;
      }

      const main = ($("aMain").value || "").trim();
      if(!main){
        showErr("Main answer is required.");
        $("aMain").focus();
        return;
      }

      const payload = {
        stationId,
        stationTitle: station.title,
        prompts: station.prompts,
        name: ($("studentName").value || "").trim(),
        answers: {
          main,
          f1: ($("aF1").value || "").trim(),
          f2: ($("aF2").value || "").trim(),
          f3: ($("aF3").value || "").trim()
        }
      };

      setLoading(true);

      try{
        const res = await fetch("/.netlify/functions/mark", {
          method: "POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify(payload)
        });

        const text = await res.text();
        let data;
        try{
          data = JSON.parse(text);
        }catch{
          showErr("Function didn't return JSON.\n\n" + text.slice(0, 600));
          return;
        }

        if(!res.ok || data.error){
          showErr(data.error || ("Request failed (" + res.status + ")"));
          return;
        }

        renderResults(data);

      }catch(e){
        showErr(e.message || "Network error");
      }finally{
        setLoading(false);
      }
    }
  </script>
</body>
</html>
