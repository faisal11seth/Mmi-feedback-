<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MedVault MMI – Station</title>

  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e5e7eb;}
    .container{max-width:1100px;margin:auto;padding:26px 16px 60px;}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .back{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(148,163,184,.25);padding:8px 12px;border-radius:10px;color:#e5e7eb;text-decoration:none;background:rgba(17,24,39,.6)}
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{width:44px;height:44px;border-radius:10px;object-fit:cover;border:1px solid rgba(148,163,184,.25)}
    .brand .name{font-weight:700;color:#e5e7eb}
    .panel{background:#111827;border:1px solid rgba(148,163,184,.18);border-radius:14px;padding:18px}
    h1{margin:0 0 8px;font-size:22px}
    .desc{color:#94a3b8;font-size:13px;margin:0 0 12px;line-height:1.35}
    .pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .pill{font-size:11px;border:1px solid rgba(148,163,184,.25);padding:4px 9px;border-radius:999px;color:#cbd5e1;background:rgba(15,23,42,.35)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media (max-width:900px){.row{grid-template-columns:1fr}}
    .block{border:1px solid rgba(148,163,184,.18);border-radius:12px;padding:14px;background:rgba(15,23,42,.25)}
    .label{font-size:12px;color:#94a3b8;margin-bottom:6px}
    .question{font-size:14px;font-weight:600;margin:0 0 10px}
    textarea,input{
      width:100%;box-sizing:border-box;background:#0b1220;color:#e5e7eb;
      border:1px solid rgba(148,163,184,.25);border-radius:10px;padding:10px 12px;
      outline:none;
    }
    textarea{min-height:90px;resize:vertical}
    input{height:42px}
    .actions{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap}
    .btn{
      background:#6366f1;border:none;color:white;font-weight:700;
      padding:12px 14px;border-radius:12px;cursor:pointer;
    }
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .small{font-size:12px;color:#94a3b8}
    .result{margin-top:16px}
    .scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:12px}
    .score{background:rgba(15,23,42,.35);border:1px solid rgba(148,163,184,.18);border-radius:12px;padding:10px}
    .score b{display:block;font-size:12px;color:#94a3b8;margin-bottom:2px}
    .score span{font-size:18px;font-weight:800}
    .h{margin:14px 0 6px;font-weight:800}
    .mono{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;font-size:12.5px;line-height:1.35}
    .err{color:#fecaca;font-weight:800;margin-bottom:6px}
  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <a class="back" href="index.html">← Back</a>
      <div class="brand">
        <div class="name">MedVaultUK</div>
        <img src="logo.png" alt="MedVaultUK logo">
      </div>
    </div>

    <div class="panel">
      <h1 id="stationTitle">Station</h1>
      <p class="desc" id="stationDesc">Loading…</p>

      <div class="pills">
        <div class="pill">Reading: 2m</div>
        <div class="pill">Response: 6m</div>
        <div class="pill">Follow-ups: 2m</div>
      </div>

      <div class="row">
        <div class="block">
          <div class="label">Student name</div>
          <input id="studentName" placeholder="Type your name" />
        </div>
      </div>

      <div style="height:14px"></div>

      <div class="row">
        <div class="block">
          <div class="label">Main question</div>
          <p class="question" id="qMain"></p>
          <div class="label">Your answer (Main)</div>
          <textarea id="aMain" placeholder="Type your spoken answer…"></textarea>
        </div>

        <div class="block">
          <div class="label">Follow-up 1</div>
          <p class="question" id="qF1"></p>
          <div class="label">Your answer (Follow-up 1)</div>
          <textarea id="aF1" placeholder="Type your spoken answer…"></textarea>
        </div>

        <div class="block">
          <div class="label">Follow-up 2</div>
          <p class="question" id="qF2"></p>
          <div class="label">Your answer (Follow-up 2)</div>
          <textarea id="aF2" placeholder="Type your spoken answer…"></textarea>
        </div>

        <div class="block">
          <div class="label">Follow-up 3</div>
          <p class="question" id="qF3"></p>
          <div class="label">Your answer (Follow-up 3)</div>
          <textarea id="aF3" placeholder="Type your spoken answer…"></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="btn">Generate feedback</button>
        <div class="small" id="status"></div>
      </div>

      <div id="out" class="result" style="display:none;"></div>
    </div>
  </div>

<script>
  // MUST match your backend STATIONS keys exactly
  const STATIONS_META = {
    blood_transfusion_refusal: {
      title: "Refusal of life-saving blood transfusion",
      desc: "Ethics station: autonomy vs beneficence, capacity (Mental Capacity Act), informed refusal/consent, escalation and documentation.",
      prompts: {
        main: "A patient refuses a life-saving blood transfusion for religious reasons. Discuss how you would approach this situation.",
        f1: "What would you do if the patient did not have capacity?",
        f2: "How would you involve the multidisciplinary team or family?",
        f3: "Can you suggest any ethically acceptable alternatives?"
      }
    },
    confidentiality_breach: {
      title: "Confidentiality breach in a public area",
      desc: "Professionalism station: confidentiality principles, challenging a colleague respectfully, escalation pathways, and reflection/learning.",
      prompts: {
        main: "You overhear a medical student discussing an identifiable patient loudly in a corridor. What do you do?",
        f1: "How would you handle it if they become defensive or dismissive?",
        f2: "What steps would you take if you believe members of the public/other patients overheard?",
        f3: "What key points would you include in a reflection about this incident?"
      }
    },
    colleague_error: {
      title: "Medication prescribing error noticed",
      desc: "Patient safety station: speaking up, managing hierarchy, preventing harm, duty of candour, teamwork under pressure.",
      prompts: {
        main: "You notice a junior doctor has prescribed a potentially harmful dose of a medication. Talk through what you would do.",
        f1: "What would you do if the doctor insists the prescription is correct and refuses to change it?",
        f2: "What would you do if you realise the patient has already received the dose?",
        f3: "How would you communicate this to the patient (or family) in line with duty of candour?"
      }
    },
    dnar_conflict: {
      title: "DNACPR disagreement with family",
      desc: "Ethics + communication: explaining DNACPR scope, best-interests reasoning, de-escalation, and supporting relatives.",
      prompts: {
        main: "A patient has a DNACPR decision documented. The family insist that ‘everything must be done’ and demand CPR. How do you respond?",
        f1: "How would you respond if a relative becomes very angry or accusatory?",
        f2: "Who is involved in making DNACPR decisions and what is the family’s role?",
        f3: "What support can you offer the family during this conversation?"
      }
    },
    capacity_refusal: {
      title: "Refusal of recommended treatment",
      desc: "Capacity & consent station: Mental Capacity Act principles, assessing capacity, exploring reasons, shared decision-making, safety-netting.",
      prompts: {
        main: "An older patient refuses a recommended treatment that you believe is in their best interests. How would you approach this?",
        f1: "How would you assess whether they have capacity for this decision?",
        f2: "What would you do if capacity is fluctuating (e.g., delirium)?",
        f3: "When, if ever, can you treat without consent?"
      }
    },
    breaking_bad_news: {
      title: "Breaking bad news: new cancer diagnosis",
      desc: "Communication station: structured delivery (SPIKES), empathy, checking understanding, responding to emotion, and next steps.",
      prompts: {
        main: "You need to explain a new cancer diagnosis to a patient. How would you structure this conversation?",
        f1: "What would you do if the patient becomes very distressed or silent?",
        f2: "What if the patient says they don’t want details right now?",
        f3: "How would you safety-net and agree a plan at the end?"
      }
    },
    team_conflict: {
      title: "Team conflict affecting patient care",
      desc: "Teamwork & professionalism: managing disagreement, focusing on patient safety, communication, escalation, and reflective practice.",
      prompts: {
        main: "You notice conflict between team members is affecting patient care on the ward. What do you do?",
        f1: "What if your attempts to address it are ignored and the risk continues?",
        f2: "Why is effective teamwork essential for patient safety?",
        f3: "What practical behaviours make teams work well day-to-day?"
      }
    },
    cultural_refusal: {
      title: "Treatment refusal due to cultural/religious beliefs",
      desc: "Ethics + cultural competence: respect, exploring beliefs, shared decisions, interpreter/chaplaincy, avoiding bias and stereotyping.",
      prompts: {
        main: "A patient refuses an important treatment because of cultural or religious beliefs. How would you approach this?",
        f1: "How would you ensure your communication is culturally safe and the patient feels respected?",
        f2: "If refusal risks significant harm, how would you explore alternatives and reach a shared plan?",
        f3: "What would you do to avoid stereotyping or assumptions about the patient’s beliefs?"
      }
    },
    consent_understanding: {
      title: "Patient lacks understanding during consent",
      desc: "Consent station: assessing understanding, explaining risks/benefits, ensuring informed consent and capacity, using teach-back.",
      prompts: {
        main: "A patient agrees to a procedure but seems not to understand what it involves. How do you proceed?",
        f1: "How do you assess whether consent is valid?",
        f2: "What would you do if they still do not understand after explanation?",
        f3: "Why is informed consent ethically important?"
      }
    },
    relative_requests_information: {
      title: "Relative requests patient information",
      desc: "Confidentiality station: consent to share information, capacity issues, managing relatives sensitively, exceptions to confidentiality.",
      prompts: {
        main: "A patient’s relative asks you for details about their condition, but the patient has not given consent to share. What do you do?",
        f1: "What if the relative insists they have a right to know?",
        f2: "When can confidentiality be breached?",
        f3: "How would you handle this sensitively while maintaining trust?"
      }
    }
  };

  function getStationId(){
    const params = new URLSearchParams(window.location.search);
    return params.get("station");
  }

  function escapeHtml(s){
    return String(s || "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function safeScore(x){
    const n = Number(x);
    if (Number.isFinite(n)) return n.toFixed(0) + "/10";
    return "–/10";
  }

  function loadStation(){
    const stationId = getStationId();
    const station = STATIONS_META[stationId];

    if(!station){
      document.getElementById("stationTitle").textContent = "Station not found";
      document.getElementById("stationDesc").textContent = "This station link is invalid. Go back and choose a station again.";
      document.getElementById("qMain").textContent = "";
      document.getElementById("qF1").textContent = "";
      document.getElementById("qF2").textContent = "";
      document.getElementById("qF3").textContent = "";
      return;
    }

    document.getElementById("stationTitle").textContent = station.title;
    document.getElementById("stationDesc").textContent = station.desc;

    document.getElementById("qMain").textContent = station.prompts.main;
    document.getElementById("qF1").textContent = station.prompts.f1;
    document.getElementById("qF2").textContent = station.prompts.f2;
    document.getElementById("qF3").textContent = station.prompts.f3;
  }

  async function generateFeedback(){
    const stationId = getStationId();
    const station = STATIONS_META[stationId];
    const status = document.getElementById("status");
    const out = document.getElementById("out");
    const btn = document.getElementById("btn");

    if(!station){
      status.textContent = "Station not found.";
      return;
    }

    btn.disabled = true;
    status.textContent = "Generating…";
    out.style.display = "none";
    out.innerHTML = "";

    const payload = {
      stationId,
      answers: {
        main: document.getElementById("aMain").value || "",
        f1: document.getElementById("aF1").value || "",
        f2: document.getElementById("aF2").value || "",
        f3: document.getElementById("aF3").value || ""
      },
      name: document.getElementById("studentName").value || ""
    };

    try{
      const res = await fetch("/.netlify/functions/mark", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });

      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch(e){
        out.style.display = "block";
        out.innerHTML = `<div class="err">Error:</div><div class="mono">Function didn’t return JSON.\n\n${escapeHtml(text)}</div>`;
        status.textContent = "";
        btn.disabled = false;
        return;
      }

      if(!res.ok || data.error){
        out.style.display = "block";
        out.innerHTML = `<div class="err">Error:</div><div class="mono">${escapeHtml(data.error || "Request failed")}\n\n${escapeHtml(data.raw || data.detail || "")}</div>`;
        status.textContent = "";
        btn.disabled = false;
        return;
      }

      const s = data.scores || {};
      const fb = data.feedback || {};
      const models = (data.models || {});

      out.style.display = "block";
      out.innerHTML = `
        <div class="scores">
          <div class="score"><b>Overall</b><span>${safeScore(s.overall)}</span></div>
          <div class="score"><b>Empathy</b><span>${safeScore(s.empathy)}</span></div>
          <div class="score"><b>Communication</b><span>${safeScore(s.communication)}</span></div>
          <div class="score"><b>Ethics</b><span>${safeScore(s.ethics)}</span></div>
          <div class="score"><b>Insight</b><span>${safeScore(s.insight)}</span></div>
        </div>

        <div class="h">Feedback — Main question</div>
        <div class="mono">${escapeHtml(fb.main || "")}</div>

        <div class="h">Model — Main (bullets)</div>
        <div class="mono">${escapeHtml(models?.main?.bullets || "")}</div>
        <div class="h">Model — Main (full)</div>
        <div class="mono">${escapeHtml(models?.main?.full || "")}</div>

        <div class="h">Feedback — Follow-up 1</div>
        <div class="mono">${escapeHtml(fb.f1 || "")}</div>
        <div class="h">Model — Follow-up 1 (bullets)</div>
        <div class="mono">${escapeHtml(models?.f1?.bullets || "")}</div>
        <div class="h">Model — Follow-up 1 (full)</div>
        <div class="mono">${escapeHtml(models?.f1?.full || "")}</div>

        <div class="h">Feedback — Follow-up 2</div>
        <div class="mono">${escapeHtml(fb.f2 || "")}</div>
        <div class="h">Model — Follow-up 2 (bullets)</div>
        <div class="mono">${escapeHtml(models?.f2?.bullets || "")}</div>
        <div class="h">Model — Follow-up 2 (full)</div>
        <div class="mono">${escapeHtml(models?.f2?.full || "")}</div>

        <div class="h">Feedback — Follow-up 3</div>
        <div class="mono">${escapeHtml(fb.f3 || "")}</div>
        <div class="h">Model — Follow-up 3 (bullets)</div>
        <div class="mono">${escapeHtml(models?.f3?.bullets || "")}</div>
        <div class="h">Model — Follow-up 3 (full)</div>
        <div class="mono">${escapeHtml(models?.f3?.full || "")}</div>
      `;

      status.textContent = "";
      btn.disabled = false;

    } catch(e){
      out.style.display = "block";
      out.innerHTML = `<div class="err">Error:</div><div class="mono">${escapeHtml(String(e))}</div>`;
      status.textContent = "";
      btn.disabled = false;
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadStation();
    document.getElementById("btn").addEventListener("click", generateFeedback);
  });
</script>
</body>
</html>
