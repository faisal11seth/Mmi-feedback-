<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MMI Station</title>
  <style>
    :root{
      --bg:#0b1020; --card:#121a33; --muted:#a9b3d6; --text:#e9eeff; --accent:#7c6cff;
      --border:rgba(255,255,255,.08); --bad:#ff6b6b;
    }
    body{ margin:0; font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      background:radial-gradient(1100px 800px at 20% 0%, rgba(124,108,255,.25), transparent 60%), var(--bg);
      color:var(--text); }
    .wrap{ max-width:1100px; margin:0 auto; padding:18px 16px 70px; }
    a{ color:var(--accent); }
    header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .back{ text-decoration:none; color:var(--muted); border:1px solid var(--border); padding:8px 10px; border-radius:10px; }
    .back:hover{ filter:brightness(1.08); }
    h1{ margin:0; font-size:22px; }
    .pill{ display:inline-block; font-size:12px; padding:3px 8px; border-radius:999px; border:1px solid var(--border); color:var(--muted); }

    .card{ background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:14px; }
    .label{ color:var(--muted); font-size:13px; margin:0 0 6px; }
    .q{ font-weight:700; margin:0; line-height:1.35; }
    .idline{ color:var(--muted); font-size:12px; margin-top:8px; }

    textarea,input{
      width:100%; box-sizing:border-box; border-radius:12px; border:1px solid var(--border);
      background:rgba(0,0,0,.18); color:var(--text); padding:12px; outline:none;
      font-family:inherit; font-size:14px; line-height:1.4;
    }
    textarea{ min-height:110px; resize:vertical; }
    .row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media (max-width: 800px){ .row{ grid-template-columns:1fr; } }

    .btn{
      display:inline-flex; align-items:center; gap:10px; font-weight:800; border-radius:12px;
      padding:12px 14px; border:0; cursor:pointer; color:white; background:rgba(124,108,255,.95);
    }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; }
    .hint{ color:var(--muted); font-size:13px; margin:10px 0 0; }

    .err{ display:none; border:1px solid rgba(255,107,107,.35); background:rgba(255,107,107,.08);
      color:#ffd1d1; border-radius:12px; padding:12px; white-space:pre-wrap; }

    .scores{ display:grid; grid-template-columns:repeat(5, minmax(0,1fr)); gap:10px; margin-top:6px; }
    @media (max-width: 900px){ .scores{ grid-template-columns:repeat(2, minmax(0,1fr)); } }
    .score{ border:1px solid var(--border); border-radius:12px; padding:10px; background:rgba(255,255,255,.02); }
    .score .k{ color:var(--muted); font-size:12px; }
    .score .v{ font-size:18px; font-weight:900; margin-top:2px; }

    .h{ font-weight:900; margin:16px 0 8px; }
    .block{ border:1px solid var(--border); border-radius:12px; padding:12px; background:rgba(255,255,255,.02); white-space:pre-wrap; }
    ul{ margin:8px 0 0 18px; }
    li{ margin:6px 0; }
    .sep{ height:1px; background:var(--border); margin:14px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="back" href="index.html">← Back</a>
      <span class="pill">MMI Feedback</span>
    </header>

    <div class="card">
      <p class="label">Station</p>
      <h1 id="stationTitle">Loading…</h1>
      <p class="label" style="margin-top:10px;">Station prompt</p>
      <p id="qMain" class="q"></p>
      <div class="idline">ID: <span id="stationIdText"></span></div>
    </div>

    <div class="card">
      <p class="label">Your name (optional)</p>
      <input id="name" placeholder="e.g. Faisal" />
    </div>

    <div class="card">
      <p class="label">Your answer (Main)</p>
      <textarea id="aMain" placeholder="Type your main answer…"></textarea>

      <div class="row" style="margin-top:14px;">
        <div>
          <p class="label">Follow-up 1</p>
          <p id="qF1" class="q"></p>
          <p class="label" style="margin-top:10px;">Your answer (Follow-up 1)</p>
          <textarea id="aF1" placeholder="Type your follow-up 1…"></textarea>
        </div>
        <div>
          <p class="label">Follow-up 2</p>
          <p id="qF2" class="q"></p>
          <p class="label" style="margin-top:10px;">Your answer (Follow-up 2)</p>
          <textarea id="aF2" placeholder="Type your follow-up 2…"></textarea>
        </div>
      </div>

      <div style="margin-top:14px;">
        <p class="label">Follow-up 3</p>
        <p id="qF3" class="q"></p>
        <p class="label" style="margin-top:10px;">Your answer (Follow-up 3)</p>
        <textarea id="aF3" placeholder="Type your follow-up 3…"></textarea>
      </div>

      <div style="display:flex; gap:12px; align-items:center; margin-top:14px;">
        <button class="btn" id="btn">Generate feedback</button>
        <span class="hint">Tip: if feedback is slow, shorten answers.</span>
      </div>

      <div id="err" class="err" style="margin-top:12px;"></div>
    </div>

    <div id="out" class="card" style="display:none;"></div>
  </div>

  <script>
    // Station bank (must match index.html IDs)
    const STATIONS = {
      blood_transfusion_refusal: {
        title: "Refusal of life-saving blood transfusion",
        prompts: {
          main: "A patient refuses a life-saving blood transfusion for religious reasons. Discuss how you would approach this situation.",
          f1: "What would you do if the patient did not have capacity?",
          f2: "How would you involve the MDT and/or family appropriately (while respecting confidentiality)?",
          f3: "Can you suggest ethically acceptable alternatives and how you would discuss them?"
        }
      },
      confidentiality_breach: {
        title: "Confidentiality breach in public",
        prompts: {
          main: "You overhear a medical student discussing an identifiable patient loudly in a corridor. What do you do?",
          f1: "What if the student becomes defensive or dismissive?",
          f2: "What if a patient or member of the public overheard and is upset?",
          f3: "What key points would you include in a reflection about this incident?"
        }
      },
      capacity_refusal: {
        title: "Capacity + refusal of treatment",
        prompts: {
          main: "A patient refuses a recommended treatment that you believe is in their best interests. How do you approach this?",
          f1: "How do you assess capacity?",
          f2: "What if family disagrees with the patient's decision?",
          f3: "What if the patient lacks capacity?"
        }
      },
      breaking_bad_news: {
        title: "Breaking bad news",
        prompts: {
          main: "You need to tell a patient that their test results show a serious diagnosis. How would you do it?",
          f1: "What if they become very distressed?",
          f2: "What support would you offer?",
          f3: "How would you safety-net and document?"
        }
      },
      consent_understanding: {
        title: "Informed consent",
        prompts: {
          main: "Explain how you would obtain informed consent for a procedure.",
          f1: "What makes consent valid?",
          f2: "How do you discuss risks and alternatives?",
          f3: "Why is informed consent ethically important?"
        }
      },
      cultural_refusal: {
        title: "Cultural/religious refusal",
        prompts: {
          main: "A patient refuses treatment due to cultural or religious beliefs. How would you approach this?",
          f1: "What if their decision places them at serious risk?",
          f2: "How would you involve interpreters or advocates?",
          f3: "How would you ensure the decision is informed and voluntary?"
        }
      },
      team_conflict: {
        title: "Team conflict",
        prompts: {
          main: "Describe how you would manage conflict within a healthcare team.",
          f1: "What if the conflict affects patient safety?",
          f2: "What if it involves a senior colleague?",
          f3: "How would you reflect and learn from it?"
        }
      },
      colleague_error: {
        title: "Colleague makes an error",
        prompts: {
          main: "You suspect a colleague has made a medication error. What do you do?",
          f1: "How do you prioritise patient safety immediately?",
          f2: "How do you handle speaking to the colleague?",
          f3: "What documentation/escalation is appropriate?"
        }
      },
      relative_requests_information: {
        title: "Relative requests patient info",
        prompts: {
          main: "A relative asks you for information about a patient’s condition. How do you respond?",
          f1: "What if the patient is present and refuses sharing?",
          f2: "What if the patient lacks capacity?",
          f3: "How do you balance confidentiality and family involvement?"
        }
      }
    };

    const $ = (id) => document.getElementById(id);

    // ✅ Accept BOTH: ?id=... and ?station=...
    const params = new URLSearchParams(window.location.search);
    const stationId = (params.get("id") || params.get("station") || "").trim();

    const station = STATIONS[stationId];

    function showErr(msg){
      $("err").style.display = "block";
      $("err").textContent = "Error:\n" + msg;
      $("out").style.display = "none";
    }
    function clearErr(){
      $("err").style.display = "none";
      $("err").textContent = "";
    }
    function setLoading(on){
      $("btn").disabled = !!on;
      $("btn").textContent = on ? "Generating…" : "Generate feedback";
    }

    function textToBulletsHtml(text){
      const t = String(text || "").trim();
      if (!t) return "";
      // Split into lines, treat lines starting with "-" or "•" as bullet items
      const lines = t.split("\n").map(x => x.trim()).filter(Boolean);
      const items = lines
        .map(l => l.replace(/^[-•]\s*/, "").trim())
        .filter(Boolean);

      // If it's clearly bullet-ish, render UL; otherwise render as paragraph block
      const bulletish = lines.length >= 2 || /^[-•]\s/.test(lines[0] || "");
      if (!bulletish) return `<div class="block">${escapeHtml(t)}</div>`;

      return `<ul>${items.map(i => `<li>${escapeHtml(i)}</li>`).join("")}</ul>`;
    }

    function escapeHtml(s){
      return String(s || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function safeScore(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function renderResults(data){
      const out = $("out");
      out.style.display = "block";

      const s = data.scores || {};
      const fb = data.feedback || {};
      const m = data.models || {};
      const fbF = (fb.followups || {});
      const mMain = (m.main || {});
      const mF = (m.followups || {});

      out.innerHTML = `
        <div class="scores">
          <div class="score"><div class="k">Overall</div><div class="v">${safeScore(s.overall)}/10</div></div>
          <div class="score"><div class="k">Communication</div><div class="v">${safeScore(s.communication)}/10</div></div>
          <div class="score"><div class="k">Empathy</div><div class="v">${safeScore(s.empathy)}/10</div></div>
          <div class="score"><div class="k">Ethics/Reasoning</div><div class="v">${safeScore(s.ethics)}/10</div></div>
          <div class="score"><div class="k">Insight</div><div class="v">${safeScore(s.insight)}/10</div></div>
        </div>

        <div class="h">Feedback — Main</div>
        <div class="block">${escapeHtml(fb.main || "")}</div>

        <div class="h">Feedback — Follow-ups</div>

        <div class="h" style="font-size:14px; margin-top:10px;">Follow-up 1</div>
        <div class="block">${escapeHtml(fbF.f1 || "")}</div>

        <div class="h" style="font-size:14px; margin-top:10px;">Follow-up 2</div>
        <div class="block">${escapeHtml(fbF.f2 || "")}</div>

        <div class="h" style="font-size:14px; margin-top:10px;">Follow-up 3</div>
        <div class="block">${escapeHtml(fbF.f3 || "")}</div>

        <div class="sep"></div>

        <div class="h">Model answer — Main (bullets)</div>
        ${textToBulletsHtml(mMain.bullets || "")}

        <div class="h">Model answer — Main</div>
        <div class="block">${escapeHtml(mMain.full || "")}</div>

        <div class="sep"></div>

        <div class="h">Model answer — Follow-up 1</div>
        ${textToBulletsHtml(mF.f1 || "")}

        <div class="h">Model answer — Follow-up 2</div>
        ${textToBulletsHtml(mF.f2 || "")}

        <div class="h">Model answer — Follow-up 3</div>
        ${textToBulletsHtml(mF.f3 || "")}
      `;
    }

    // Populate station
    if (!station) {
      document.title = "MMI Station";
      $("stationTitle").textContent = "Station not found";
      $("qMain").textContent = "This station link is invalid. Go back and select a station again.";
      $("qF1").textContent = "—";
      $("qF2").textContent = "—";
      $("qF3").textContent = "—";
      $("stationIdText").textContent = stationId ? stationId : "—";
      $("btn").disabled = true;
    } else {
      document.title = "MMI – " + station.title;
      $("stationTitle").textContent = station.title;
      $("qMain").textContent = station.prompts.main;
      $("qF1").textContent = station.prompts.f1;
      $("qF2").textContent = station.prompts.f2;
      $("qF3").textContent = station.prompts.f3;
      $("stationIdText").textContent = stationId;
    }

    $("btn").addEventListener("click", async () => {
      clearErr();

      if (!station) return;

      const main = $("aMain").value.trim();
      if (!main) {
        showErr("Main answer is required.");
        return;
      }

      setLoading(true);

      try {
        const payload = {
          stationId,
          stationTitle: station.title,
          prompts: station.prompts,
          answers: {
            main,
            f1: $("aF1").value.trim(),
            f2: $("aF2").value.trim(),
            f3: $("aF3").value.trim()
          },
          name: $("name").value.trim()
        };

        const resp = await fetch("/.netlify/functions/mark", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const text = await resp.text();
        let json;
        try { json = JSON.parse(text); } catch(e){
          showErr("Function didn't return JSON.\n\n" + text.slice(0, 800));
          setLoading(false);
          return;
        }

        if (!resp.ok) {
          showErr(json.error ? (json.error + (json.details ? ("\n\n" + json.details) : "")) : ("Request failed ("+resp.status+")"));
          setLoading(false);
          return;
        }

        renderResults(json);
      } catch (e) {
        showErr(e?.message || "Unknown client error");
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
